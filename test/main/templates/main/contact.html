{% extends 'main/layout/layout.html' %}

{% block title%}Contact Us{% endblock %}

{% block content%}
    
    <div class="d-flex justify-content-center px-4">
        <form novalidate style='width: 70vh;'>
            <h1 class="text-center">Contact Us</h1>
            <hr>
            <div class='form-floating'>
                <input type="email" id='email' class='form-control' placeholder='joe@gmail.com' required>
                <label for='email' class='form-label'>Email</label>
                <div class='invalid-feedback'>
                    Invalid email
                </div>
            </div>
            <div class='form-floating mb-3'>
                <textarea name="text" id="textarea1" placeholder='Your issue' class='form-control' style="height: 12rem"></textarea>
                <label for='textarea1' class='form-label'>Issue</label>
            </div>
            <button class='btn btn-outline-primary'>Submit</button>
        </form>
    </div>
    <script>
        const form=document.querySelector("form")
        form.addEventListener('submit', e => {
            if(!form.checkValidity()){
                e.preventDefault()
            }
            form.classList.add('was-validated')
        })
    </script>

{% endblock %}
